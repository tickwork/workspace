name: Update submodule ref

on:
  workflow_call:
    inputs:
      submodule:
        description: Submodule name (matches directory path in workspace)
        required: true
        type: string
      branch:
        description: Branch to update (main or dev)
        required: true
        type: string
    secrets:
      TW_WORKSPACE_CI_TOKEN:
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.TW_WORKSPACE_CI_TOKEN }}
          submodules: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update submodule ref with retry
        env:
          TW_WORKSPACE_CI_TOKEN: ${{ secrets.TW_WORKSPACE_CI_TOKEN }}
        run: |
          SUBMODULE="${{ inputs.submodule }}"
          BRANCH="${{ inputs.branch }}"
          MAX_ATTEMPTS=5

          # Authenticate git for ls-remote on private submodule repos
          git config --global \
            url."https://x-access-token:${TW_WORKSPACE_CI_TOKEN}@github.com/".insteadOf \
            "https://github.com/"

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt/$MAX_ATTEMPTS"

            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # Resolve submodule URL and tracked branch from .gitmodules
            SUBMODULE_URL=$(git config --file .gitmodules "submodule.${SUBMODULE}.url")
            TRACKED_BRANCH=$(git config --file .gitmodules "submodule.${SUBMODULE}.branch" 2>/dev/null || echo "$BRANCH")

            # Get new SHA via ls-remote (no clone needed)
            NEW_SHA=$(git ls-remote "$SUBMODULE_URL" "refs/heads/${TRACKED_BRANCH}" | cut -f1)

            if [ -z "$NEW_SHA" ]; then
              echo "Could not resolve SHA for ${SUBMODULE}@${TRACKED_BRANCH}" >&2
              exit 1
            fi

            # Get current recorded SHA for this submodule gitlink
            CURRENT_SHA=$(git ls-tree HEAD "$SUBMODULE" 2>/dev/null | awk '{print $3}')

            if [ "$CURRENT_SHA" = "$NEW_SHA" ]; then
              echo "No change in $SUBMODULE ref ($NEW_SHA), nothing to commit."
              exit 0
            fi

            echo "Updating $SUBMODULE: $CURRENT_SHA -> $NEW_SHA"
            git update-index --cacheinfo "160000,${NEW_SHA},${SUBMODULE}"
            git commit -m "chore: update $SUBMODULE ref [skip-sync]"

            if git push origin "$BRANCH"; then
              echo "Successfully updated $SUBMODULE on $BRANCH."
              exit 0
            fi

            if [[ $attempt -lt $MAX_ATTEMPTS ]]; then
              SLEEP=$((attempt * attempt))
              echo "Push failed (race condition?), retrying in ${SLEEP}s..."
              sleep $SLEEP
            fi
          done

          echo "Failed to push after $MAX_ATTEMPTS attempts." >&2
          exit 1
