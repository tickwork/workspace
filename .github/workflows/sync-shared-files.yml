name: Sync files between main and dev

on:
  push:
    branches: [main, dev]

jobs:
  sync:
    runs-on: ubuntu-latest
    # Avoid infinite loop: skip commits produced by this workflow
    if: "!contains(github.event.head_commit.message, '[skip-sync]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TW_WORKSPACE_CI_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine target branch
        id: target
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "branch=dev" >> "$GITHUB_OUTPUT"
          else
            echo "branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync files to target branch
        run: |
          SOURCE="${{ github.ref_name }}"
          TARGET="${{ steps.target.outputs.branch }}"

          git fetch origin "$TARGET"
          git checkout "$TARGET"

          # Read submodule paths dynamically to exclude gitlinks
          SUBMODULE_PATHS=$(git config --file .gitmodules --get-regexp 'submodule\..*\.path' 2>/dev/null | awk '{print $2}' || true)

          # Find files changed on source vs target
          CHANGED=$(git diff --name-only "origin/$TARGET" "origin/$SOURCE")

          FILES_TO_SYNC=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # Exclude .gitmodules and submodule root paths
            SKIP=false
            [[ "$f" == ".gitmodules" ]] && SKIP=true
            for sub in $SUBMODULE_PATHS; do
              [[ "$f" == "$sub" || "$f" == "$sub/"* ]] && SKIP=true && break
            done
            [[ "$SKIP" == "false" ]] && FILES_TO_SYNC+=("$f")
          done <<< "$CHANGED"

          if [ ${#FILES_TO_SYNC[@]} -eq 0 ]; then
            echo "No files to sync."
            exit 0
          fi

          echo "Syncing: ${FILES_TO_SYNC[*]}"
          git checkout "origin/$SOURCE" -- "${FILES_TO_SYNC[@]}"

          if git diff --cached --quiet; then
            echo "No changes after filtering."
            exit 0
          fi

          git commit -m "chore: sync files from $SOURCE [skip-sync]"
          git push origin "$TARGET"
